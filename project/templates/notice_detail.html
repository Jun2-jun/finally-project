<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }}</title>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        body {
            margin: 30px;
            font-family: Arial, sans-serif;
        }

        .post-container {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 5px;
            background-color: #fafafa;
        }

        .post-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .post-meta {
            color: #666;
            margin-bottom: 20px;
        }

        .post-content {
            border-top: 1px solid #ccc;
            padding-top: 20px;
            font-size: 16px;
        }

        .delete-area {
            display: flex;
            justify-content: flex-start;
            margin-top: 15px;
        }

        .delete-button {
            background-color: #e53434;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .delete-button:hover {
            background-color: #c22c2c;
        }

        .back-link {
            margin-top: 20px;
            display: inline-block;
        }
        .button-area {
        display: flex;
        justify-content: flex-end;
        margin-top: 20px;
        gap: 10px;
    }

    .back-button {
        background-color: #3498db;
        color: white;
        padding: 10px 15px;
        border-radius: 5px;
        text-decoration: none;
        font-size: 14px;
        transition: background-color 0.3s;
    }

    .back-button:hover {
        background-color: #2c3e50;
    }
    .image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
        justify-content: center;
        align-items: start;
    }

    .image-wrapper {
        border: 1px solid #ccc;
        border-radius: 5px;
        padding: 10px;
        background-color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        max-width: 100%;
        height: auto;
    }

    .image-wrapper img {
        max-width: 100%;
        max-height: 250px;
        object-fit: contain;
        display: block;
    }
</style>


    </style>
</head>
<body>

    <!-- 게시글 네모 상자 -->
    <div class="post-container">
        <div class="post-title">{{ post.title }}</div>
        <div class="post-meta">
            <p><strong>카테고리:</strong> {{ post.category }}</p>
            <p><strong>작성일:</strong> {{ post.created_at }}</p>
        </div>
        <div class="post-content">
            {{ post.comment | safe }}
        </div>

        {% if post.images %}
        <div class="post-images" style="margin-top: 20px;">
            <h4>첨부 이미지</h4>
            <div class="image-grid">
                {% for image_url in post.images %}
                <div class="image-wrapper">
                    <img src="{{ image_url }}" alt="첨부 이미지">
                </div>
                {% endfor %}
            </div>
        </div>
        {% endif %}


    <div class="button-area">
        <form method="POST" action="{{ url_for('notice_delbutton', post_id=post.id) }}" style="margin-right: 10px;">
            <button type="submit" class="delete-button">삭제</button>
        </form>
        <a href="#" onclick="goBackToNotice()" class="back-button">목록으로 돌아가기</a>
    </div>
    <script>
        function goBackToNotice() {
            location.replace("{{ url_for('notice') }}");
        }
    
        // 이전 페이지 캐시 방지: 뒤로가기 시 조회수 갱신
        window.addEventListener('pageshow', function (event) {
            if (event.persisted || performance.getEntriesByType("navigation")[0].type === "back_forward") {
                location.reload();
            }
        });
    </script>
        
</body>
</html>
