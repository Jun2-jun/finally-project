<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>공지사항</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 40px;
        }
        table {
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <h2>공지사항</h2>

    <form action="/api/notice" method="post" class="mb-3">
        <div>
            <input type="date" id="startDate" name="startDate"> ~ 
            <input type="date" id="endDate" name="endDate"> 
            <button type="submit">날짜 범위 가져오기</button>
        </div>

        <div class="search mt-3">
            <input type="text" name="query" value="" placeholder="검색어를 입력하세요">
            <button type="submit">검색</button>
        </div>
    </form>

        <!-- 공지사항 테이블 -->
    <table class="table table-bordered text-center">
        <thead class="table-light">
            <tr>
                <th class="text-center">번호</th>
                <th class="text-center">제목</th>
                <th class="text-center">작성자</th>
                <th class="text-center">작성일자</th>
                <th class="text-center">조회수</th>
            </tr>
        </thead>
        <tbody>
            {% if notices %}
                {% for notice in notices %}
                <tr>
                    <td class="text-center">{{ notice.id }}</td>
                    <td class="text-center">{{ notice.title }}</td>
                    <td class="text-center">{{ notice.writer }}</td>
                    <td class="text-center">{{ notice.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
                    <td class="text-center">{{ notice.views }}</td>
                </tr>
                {% endfor %}
            {% else %}
                <tr>
                    <td colspan="5" class="text-center">공지사항이 없습니다.</td>
                </tr>
            {% endif %}
        </tbody>
    </table>

    



    <!-- 글쓰기 폼 (관리자만 보임) -->
    {% if is_admin %}
    <form action="/write" method="POST" class="d-flex mt-4">
        <input type="text" name="title" class="form-control me-2" placeholder="공지 제목 입력" required>
        <button type="submit" class="btn btn-primary">글쓰기</button>
    </form>
    {% endif %}
    

    
</body>
</html>
