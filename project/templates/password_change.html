<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #eef4ff;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 420px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .form-control::placeholder {
            color: #bbb;
        }

        .submit-btn {
            margin-top: 25px;
            background-color: #6ca9ff;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            height: 48px;
            font-size: 16px;
        }

        .submit-btn:hover {
            background-color: #4d91f7;
        }

        .form-icon {
            position: absolute;
            top: 11px;
            left: 15px;
            color: #999;
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        .form-control {
            padding-left: 40px;
            height: 45px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>비밀번호 변경</h2>
        <form method="POST" action="/change_password">
            <div class="form-group">
                <i class="fas fa-lock form-icon"></i>
                <input type="password" name="current_password" class="form-control" placeholder="기존 비밀번호" required>
            </div>
            <div class="form-group">
                <i class="fas fa-key form-icon"></i>
                <input type="password" name="new_password" class="form-control" placeholder="새 비밀번호" required>
            </div>
            <div class="form-group">
                <i class="fas fa-key form-icon"></i>
                <input type="password" name="confirm_password" class="form-control" placeholder="새 비밀번호 확인" required>
            </div>
            <button type="submit" class="btn submit-btn w-100">변경하기</button>
        </form>
    </div>

    <!-- 아이콘 CDN -->
    <script src="https://kit.fontawesome.com/a2d042a1fe.js" crossorigin="anonymous"></script>
</body>
</html>
