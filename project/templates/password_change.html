<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: #eef4ff;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 420px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .form-control::placeholder {
            color: #bbb;
        }

        .submit-btn {
            margin-top: 25px;
            background-color: #6ca9ff;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            height: 48px;
            font-size: 16px;
        }

        .submit-btn:hover {
            background-color: #4d91f7;
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        .form-control {
            padding-left: 40px;
            height: 45px;
        }

        .form-icon {
            position: absolute;
            top: 11px;
            left: 15px;
            color: #999;
        }

        .toggle-password {
            position: absolute;
            top: 11px;
            right: 15px;
            color: #999;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>비밀번호 변경</h2>
        <form method="POST" action="/change_password" id="password-form">
            <div class="form-group">
                <i class="fas fa-lock form-icon"></i>
                <input type="password" id="current_password" name="current_password" class="form-control" placeholder="기존 비밀번호" required>
                <i class="far fa-eye toggle-password" onclick="togglePassword('current_password', this)"></i>
            </div>
            <div class="form-group">
                <i class="fas fa-key form-icon"></i>
                <input type="password" id="new_password" name="new_password" class="form-control" placeholder="새 비밀번호" required>
                <i class="far fa-eye toggle-password" onclick="togglePassword('new_password', this)"></i>
            </div>
            <div class="form-group">
                <i class="fas fa-key form-icon"></i>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="새 비밀번호 확인" required>
                <i class="far fa-eye toggle-password" onclick="togglePassword('confirm_password', this)"></i>
            </div>
            <button type="submit" class="btn submit-btn w-100">변경하기</button>
        </form>
    </div>

    <script>
        // 비밀번호 보이기/숨기기 기능
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            const isVisible = input.type === "text";

            input.type = isVisible ? "password" : "text";
            icon.classList.toggle("fa-eye");
            icon.classList.toggle("fa-eye-slash");
        }

        // 비밀번호 일치 확인
        document.getElementById("password-form").addEventListener("submit", function(e) {
            const newPassword = document.getElementById("new_password").value;
            const confirmPassword = document.getElementById("confirm_password").value;

            if (newPassword !== confirmPassword) {
                e.preventDefault(); // 폼 제출 방지
                alert("새 비밀번호가 일치하지 않습니다.");
            }
        });
    </script>
</body>
</html>
