<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 30px;
            font-family: Arial, sans-serif;
        }
        h2, h4 {
            color: #333;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 20px;
            margin-bottom: 5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #3498db;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input[type="text"]::placeholder {
            color: #a9a9a9;
        }
        .editor-container {
            margin-top: 20px;
        }
        .editor.placeholder {
            color: #a9a9a9;
        }

        .toolbar {
            background-color: #f3f3f3;
            padding: 10px;
            border-radius: 5px 5px 0 0;
            border: 2px solid #3498db;
            border-bottom: none;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .toolbar button {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 3px;
            padding: 5px 10px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .toolbar button:hover {
            background-color: #e9e9e9;
        }
        .toolbar button.active {
            background-color: #5abdff;
            border-color: #3498db;
        }
        .separator {
            width: 1px;
            background-color: #ddd;
            margin: 0 5px;
        }
        .editor {
            min-height: 400px;
            padding: 10px;
            border: 2px solid #3498db;
            border-radius: 0 0 5px 5px;
            font-size: 16px;
            outline: none;
            overflow-y: auto;
            box-sizing: border-box;
        }
        .write-button {
            margin-top: 5px;
            margin-right: 10px;
            padding: 8px 16px;
            background-color: #5abdff;
            color: white;
            border: 2px solid #3498db;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        .write-button:hover {
            background-color: #3498db;
        }
        .del-button {
            margin-top: 5px;
            padding: 8px 16px;
            background-color: #e53434;
            color: white;
            border: 2px solid #941717;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .del-button:hover {
            background-color: #941717;
        }
        .font-size-select {
            padding: 5px;
            border-radius: 3px;
            border: 1px solid #ddd;
        }
        .color-picker {
            height: 28px;
            padding: 0;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        /* 알림 스타일 */
        .alerts {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        .alert {
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .alert-success {
            background-color: #3498db;
        }
        .alert-error {
            background-color: #e53434;
        }
        .show {
            opacity: 1;
        }
        /* 이미지 업로드 모달 및 탭 */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1001;
            justify-content: center;
            align-items: center;
            overflow: auto; /* 핵심: 모달 전체에서 스크롤 허용 */
        }

        .image-modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            max-width: 90vw;
            max-height: 90vh;
            overflow: auto; /* 핵심: 모달 내부에서 이미지 크면 스크롤됨 */
        }

        #upload-preview {
            display: block;
            max-width: 100%;
            max-height: 80vh;
            width: auto;
            height: auto;
            object-fit: contain;
            margin: 0 auto;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .modal-header h3 {
            margin: 0;
        }
        .modal-close {
            cursor: pointer;
            font-size: 20px;
        }
        .image-tab {
            display: flex;
            border-bottom: 1px solid #ddd;
            margin-bottom: 15px;
        }
        .tab-button {
            padding: 10px 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            opacity: 0.7;
        }
        .tab-button.active {
            opacity: 1;
            border-bottom: 2px solid #3498db;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .file-upload-area {
            border: 2px dashed #ddd;
            padding: 30px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .file-upload-area:hover {
            border-color: #3498db;
        }
        #file-upload {
            display: none;
        }
        .url-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .insert-button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .image-preview {
            max-width: 100%;
            max-height: calc(100vh - 300px); /* 모달 높이 내에서만 표시 */
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .image-modal-content {
            max-height: 80vh;
            overflow-y: auto;
        }


        .editor img {
            max-width: 100%;
            height: auto;
        }
        /* 업로드된 파일명 리스트 스타일 */
        #uploaded-preview-container {
            margin-top: 15px;
        }
        #uploaded-files {
            list-style: none;
            padding-left: 0;
        }
        .uploaded-file-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            font-size: 15px;
        }
        .uploaded-file-name {
            flex-grow: 1;
            word-break: break-all;
        }
        .remove-file-btn {
            background-color: transparent;
            color: red;
            border: none;
            font-size: 16px;
            cursor: pointer;
            margin-left: 10px;
        }
        /* 업로드 개수 실시간 표시 */
        #upload-count-text {
            font-size: 14px;
            color: gray;
        }
    </style>
</head>
<body>
    <h2>공지사항</h2>
    <form method="POST" action="/notice/notice_write" id="content-form" enctype="multipart/form-data">
        <label for="title">제목</label>
        <input type="text" name="title" id="title" placeholder="제목을 입력하세요" required>

        <label for="comment">내용</label>
        <div class="editor-container">
            <div class="toolbar">
                <button type="button" id="bold" title="굵게"><i class="fas fa-bold"></i></button>
                <button type="button" id="italic" title="기울임"><i class="fas fa-italic"></i></button>
                <button type="button" id="underline" title="밑줄"><i class="fas fa-underline"></i></button>
                <button type="button" id="strikethrough" title="취소선"><i class="fas fa-strikethrough"></i></button>
                
                <div class="separator"></div>
                
                <button type="button" id="align-left" title="왼쪽 정렬"><i class="fas fa-align-left"></i></button>
                <button type="button" id="align-center" title="가운데 정렬"><i class="fas fa-align-center"></i></button>
                <button type="button" id="align-right" title="오른쪽 정렬"><i class="fas fa-align-right"></i></button>
                <button type="button" id="align-justify" title="양쪽 정렬"><i class="fas fa-align-justify"></i></button>
                
                <div class="separator"></div>
                
                <button type="button" id="list-ul" title="글머리 기호"><i class="fas fa-list-ul"></i></button>
                <button type="button" id="list-ol" title="번호 매기기"><i class="fas fa-list-ol"></i></button>
                <button type="button" id="indent" title="들여쓰기"><i class="fas fa-indent"></i></button>
                <button type="button" id="outdent" title="내어쓰기"><i class="fas fa-outdent"></i></button>
                
                <div class="separator"></div>
                
                <select id="font-size" class="font-size-select" title="글자 크기">
                    <option value="1">크기 1</option>
                    <option value="2">크기 2</option>
                    <option value="3" selected>크기 3</option>
                    <option value="4">크기 4</option>
                    <option value="5">크기 5</option>
                    <option value="6">크기 6</option>
                    <option value="7">크기 7</option>
                </select>
                
                <input type="color" id="font-color" class="color-picker" title="글자 색상" value="#000000">
                <input type="color" id="bg-color" class="color-picker" title="배경 색상" value="#ffffff">
                
                <div class="separator"></div>
                
                <button type="button" id="image" title="이미지 삽입"><i class="fas fa-image"></i></button>
                
                <div class="separator"></div>
    
                <button type="button" id="undo" title="실행 취소"><i class="fas fa-undo"></i></button>
                <button type="button" id="redo" title="다시 실행"><i class="fas fa-redo"></i></button>
                <button type="button" id="clear" title="모두 지우기"><i class="fas fa-trash"></i></button>
            </div>
            
            <div class="editor" id="editor" contenteditable="true">내용을 입력하세요</div>
            <textarea name="comment" id="comment" style="display: none;"></textarea>
        </div>
        <div id="uploaded-preview-container" style="margin-top: 20px;">
            <p id="upload-count-text" style="font-size: 16px; font-weight: bold; margin: 10px 0;">업로드된 이미지: 0 / 5</p>
            <ul id="uploaded-files"></ul>
        </div>

        <!-- 이미지 파일을 저장하기 위한 히든 입력 필드 -->
        <div id="image-uploads-container" style="display: none;"></div>

        <!-- 파일 업로드 input (모달 내부에서 사용) -->
        <div class="image-modal" id="image-modal">
            <div class="image-modal-content">
                <div id="image-alert" style="display: none; background-color: #e53434; color: white; padding: 10px; border-radius: 5px; margin-bottom: 10px;"></div>
                <div class="modal-header">
                    <h3>이미지 삽입</h3>
                    <span class="modal-close" id="close-modal">&times;</span>
                </div>
                
                <div class="image-tab">
                    <button class="tab-button active" data-tab="upload">내 파일에서 가져오기</button>
                    <button class="tab-button" data-tab="url">URL로 가져오기</button>
                </div>
                
                <div class="tab-content active" id="upload-tab">
                    <div class="file-upload-area" id="drop-area">
                        <p>이미지를 여기에 끌어다 놓거나 클릭하여 업로드하세요</p>
                        <input type="file" id="file-upload" accept="image/*">
                    </div>
                    <img id="upload-preview" class="image-preview" src="" alt="미리보기">
                    <button type="button" id="insert-upload" class="insert-button" disabled>이미지 삽입</button>
                </div>
                
                <div class="tab-content" id="url-tab">
                    <input type="text" id="image-url" class="url-input" placeholder="이미지 URL을 입력하세요">
                    <img id="url-preview" class="image-preview" src="" alt="미리보기">
                    <button type="button" id="insert-url" class="insert-button">이미지 삽입</button>
                </div>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
            <a href="{{ url_for('notice') }}" class="del-button" style="text-align: center; text-decoration: none;">목록으로 돌아가기</a>
            <button type="submit" class="write-button">등록</button>
        </div>
        
    </form>
    

    <div class="alerts" id="alerts-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const editor = document.getElementById('editor');
            const commentTextarea = document.getElementById('comment');
            const form = document.getElementById('content-form');
            const alertsContainer = document.getElementById('alerts-container');
            const imageModal = document.getElementById('image-modal');
            const closeModal = document.getElementById('close-modal');
            const fileUpload = document.getElementById('file-upload');
            const imageUrl = document.getElementById('image-url');
            const uploadPreview = document.getElementById('upload-preview');
            const urlPreview = document.getElementById('url-preview');
            const insertUpload = document.getElementById('insert-upload');
            const insertUrl = document.getElementById('insert-url');
            const dropArea = document.getElementById('drop-area');
            const tabButtons = document.querySelectorAll('.tab-button');
            const tabContents = document.querySelectorAll('.tab-content');
            const imageUploadsContainer = document.getElementById('image-uploads-container');
            
            // 이미지 카운터는 필요 시 확장
            let imageCounter = 0;
            
            
            // 1. 페이지 로딩 시 placeholder 적용
            if (editor.textContent.trim() === '' || editor.textContent === '내용을 입력하세요') {
                editor.textContent = '내용을 입력하세요';
                editor.classList.add('placeholder');
            }

            // 2. 에디터 클릭하면 placeholder 지우기
            editor.addEventListener('focus', function () {
                if (editor.classList.contains('placeholder')) {
                    editor.textContent = '';
                    editor.classList.remove('placeholder');
                }
            });

            const titleInput = document.getElementById('title');
            titleInput.addEventListener('focus', function () {
                this.placeholder = '';
            });

            titleInput.addEventListener('blur', function () {
                if (this.value.trim() === '') {
                    this.placeholder = '제목을 입력하세요';
                }
            });


            // 3. 에디터 벗어나면 비어있을 때 다시 placeholder 보이기
            editor.addEventListener('blur', function () {
                if (editor.textContent.trim() === '') {
                    editor.textContent = '내용을 입력하세요';
                    editor.classList.add('placeholder');
                }
            });


            
            // 폼 제출 시 에디터 내용을 textarea에 복사
            form.addEventListener('submit', function(e) {
                commentTextarea.value = editor.innerHTML;
            });
            
            // 툴바 버튼 기능 설정
            document.getElementById('bold').addEventListener('click', () => execCommand('bold', false, null));
            document.getElementById('italic').addEventListener('click', () => execCommand('italic', false, null));
            document.getElementById('underline').addEventListener('click', () => execCommand('underline', false, null));
            document.getElementById('strikethrough').addEventListener('click', () => execCommand('strikeThrough', false, null));
            
            document.getElementById('align-left').addEventListener('click', () => execCommand('justifyLeft', false, null));
            document.getElementById('align-center').addEventListener('click', () => execCommand('justifyCenter', false, null));
            document.getElementById('align-right').addEventListener('click', () => execCommand('justifyRight', false, null));
            document.getElementById('align-justify').addEventListener('click', () => execCommand('justifyFull', false, null));
            
            document.getElementById('list-ul').addEventListener('click', () => execCommand('insertUnorderedList', false, null));
            document.getElementById('list-ol').addEventListener('click', () => execCommand('insertOrderedList', false, null));
            document.getElementById('indent').addEventListener('click', () => execCommand('indent', false, null));
            document.getElementById('outdent').addEventListener('click', () => execCommand('outdent', false, null));
            
            document.getElementById('font-size').addEventListener('change', function() {
                execCommand('fontSize', false, this.value);
            });
            
            document.getElementById('font-color').addEventListener('input', function() {
                execCommand('foreColor', false, this.value);
            });
            
            document.getElementById('bg-color').addEventListener('input', function() {
                execCommand('hiliteColor', false, this.value);
            });
            
            document.getElementById('undo').addEventListener('click', () => execCommand('undo', false, null));
            document.getElementById('redo').addEventListener('click', () => execCommand('redo', false, null));
            
            document.getElementById('clear').addEventListener('click', function() {
                if (confirm('모든 내용을 지우시겠습니까?')) {
                    document.getElementById('title').value = '';
                    editor.innerHTML = '내용을 입력하세요';
                    imageUploadsContainer.innerHTML = '';
                    updateUploadCount();
                    // 업로드된 파일명 리스트도 지우기
                    document.getElementById('uploaded-files').innerHTML = '';
                    showAlert('success', '초기화되었습니다.');
                }
            });
            
            // execCommand 함수 정의
            function execCommand(command, showUI, value) {
                document.execCommand(command, showUI, value);
                editor.focus();
            }
            
            // 알림 표시 함수
            function showAlert(type, message) {
                const alertDiv = document.createElement('div');
                alertDiv.className = `alert alert-${type}`;
                alertDiv.textContent = message;
                
                alertsContainer.appendChild(alertDiv);
                
                setTimeout(() => {
                    alertDiv.classList.add('show');
                }, 10);
                
                setTimeout(() => {
                    alertDiv.classList.remove('show');
                    setTimeout(() => {
                        alertsContainer.removeChild(alertDiv);
                    }, 300);
                }, 3000);
            }
            
            // 활성화된 버튼 스타일 적용
            const buttons = document.querySelectorAll('.toolbar button');
            buttons.forEach(button => {
                button.addEventListener('click', function() {
                    const command = this.id;
                    if (['bold', 'italic', 'underline', 'strikethrough'].includes(command)) {
                        this.classList.toggle('active');
                    }
                    if (['align-left', 'align-center', 'align-right', 'align-justify'].includes(command)) {
                        document.querySelectorAll('#align-left, #align-center, #align-right, #align-justify').forEach(btn => {
                            btn.classList.remove('active');
                        });
                        this.classList.add('active');
                    }
                });
            });
            
            // 이미지 버튼 클릭 시 모달 표시
            document.getElementById('image').addEventListener('click', function () {
                imageModal.style.display = 'flex';

                // 업로드 미리보기 초기화
                uploadPreview.src = '';
                uploadPreview.style.display = 'none';
                uploadPreview.removeAttribute('data-image-id');
                uploadPreview.removeAttribute('data-file');
                insertUpload.disabled = true;

                // 기타 초기화
                uploadPreview.removeAttribute('width');
                uploadPreview.removeAttribute('height');
            });

            
            // 모달 닫기
            closeModal.addEventListener('click', function() {
                imageModal.style.display = 'none';
                resetImageInputs();
            });
            
            window.addEventListener('click', function(e) {
                if (e.target === imageModal) {
                    imageModal.style.display = 'none';
                    resetImageInputs();
                }
            });
            
            // 탭 전환
            tabButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const tabId = this.getAttribute('data-tab');
                    tabButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    
                    tabContents.forEach(content => content.classList.remove('active'));
                    document.getElementById(`${tabId}-tab`).classList.add('active');
                    resetImageInputs();
                });
            });
            
            // 파일 업로드 영역 클릭
            dropArea.addEventListener('click', function() {
                fileUpload.click();
            });
            
            // 파일 선택 이벤트
            fileUpload.addEventListener('change', function() {
                if (this.files[0]) {
                    handleFileUpload(this.files[0]);
                }
            });
            
            // 드래그 앤 드롭 이벤트
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, preventDefaults, false);
            });
            
            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            ['dragenter', 'dragover'].forEach(eventName => {
                dropArea.addEventListener(eventName, function() {
                    dropArea.style.borderColor = '#2cce57';
                }, false);
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, function() {
                    dropArea.style.borderColor = '#ddd';
                }, false);
            });
            
            dropArea.addEventListener('drop', function(e) {
                const dt = e.dataTransfer;
                const file = dt.files[0];
                if (file && file.type.match('image.*')) {
                    handleFileUpload(file);
                }
            }, false);
            
            // 이미지 업로드 개수 제한 및 파일명 리스트에 추가
            function handleFileUpload(file) {
                // 업로드된 파일 갯수 제한 (최대 5)
                const currentFileCount = document.querySelectorAll('#uploaded-files li').length;
                if (currentFileCount >= 5) {
                    const alertBox = document.getElementById('image-alert');
                    alertBox.textContent = '이미지는 최대 5개까지만 업로드할 수 있습니다.';
                    alertBox.style.display = 'block';
                    return;
                }

                if (file && file.type.match('image.*')) {
                    const imageId = 'img-' + (++imageCounter);

                    const reader = new FileReader();
                    
                    reader.onload = function(e) {
                        uploadPreview.src = e.target.result;
                        uploadPreview.style.display = 'block';
                        insertUpload.disabled = false;
                        uploadPreview.setAttribute('data-file', file.name);
                        uploadPreview.setAttribute('data-image-id', imageId);
                    };
                    
                    reader.readAsDataURL(file);
                    
                    // 히든 input 생성 및 파일 저장
                    const fileInput = document.createElement('input');
                    fileInput.type = 'file';
                    fileInput.name = 'images';                    fileInput.setAttribute('data-image-id', imageId);
                    fileInput.style.display = 'none';
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(file);
                    fileInput.files = dataTransfer.files;
                    imageUploadsContainer.appendChild(fileInput);
                    
                    // 파일명 리스트에 항목 추가
                    const uploadedFilesList = document.getElementById('uploaded-files');
                    const listItem = document.createElement('li');
                    listItem.className = 'uploaded-file-item';
                    listItem.setAttribute('data-image-id', imageId);
                    
                    const fileNameSpan = document.createElement('span');
                    fileNameSpan.className = 'uploaded-file-name';
                    fileNameSpan.textContent = file.name;
                    
                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'remove-file-btn';
                    removeBtn.innerHTML = '&times;';
                    removeBtn.addEventListener('click', function () {
                        listItem.remove();
                        fileInput.remove();
                        updateUploadCount();

                        // 현재 삭제하려는 이미지 ID
                        const previewImageId = uploadPreview.getAttribute('data-image-id');
                        const deletedImageId = imageId;

                        // 1. 에디터 내부에 삽입된 이미지 제거
                        const editorImages = editor.querySelectorAll(`img[data-image-id="${deletedImageId}"]`);
                        editorImages.forEach(img => {
                            const wrapper = img.closest('.image-wrapper');
                            if (wrapper) {
                                wrapper.remove();
                            }
                        });

                        // 2. 이미지 미리보기에 해당 이미지가 있을 경우 제거
                        if (previewImageId === deletedImageId) {
                            uploadPreview.src = '';
                            uploadPreview.style.display = 'none';
                            uploadPreview.removeAttribute('data-image-id');
                            uploadPreview.removeAttribute('data-file');
                            uploadPreview.removeAttribute('width');
                            uploadPreview.removeAttribute('height');
                            insertUpload.disabled = true;
                        }

                        // 3. URL 입력창 초기화 (탭 전환 시 영향 방지)
                        imageUrl.value = '';
                        urlPreview.src = '';
                        urlPreview.style.display = 'none';

                        // 4. 알림
                        showAlert('success', '업로드된 파일이 삭제되었습니다.');
                    });


                    
                    listItem.appendChild(fileNameSpan);
                    listItem.appendChild(removeBtn);
                    uploadedFilesList.appendChild(listItem);
                    
                    updateUploadCount();
                }
            }
            
            // 업로드 개수 업데이트 함수
            function updateUploadCount() {
                const count = document.querySelectorAll('#uploaded-files li').length;
                document.getElementById('upload-count-text').textContent = `업로드된 이미지: ${count} / 5`;
            }
            
            // URL 입력 처리 및 이미지 미리보기 (URL로 삽입)
            imageUrl.addEventListener('input', function() {
                const url = this.value.trim();
                if (url) {
                    urlPreview.src = url;
                    urlPreview.style.display = 'block';
                    urlPreview.onload = function() {};
                    urlPreview.onerror = function() {
                        urlPreview.style.display = 'none';
                        showAlert('error', '이미지를 로드할 수 없습니다. URL을 확인해주세요.');
                    };
                } else {
                    urlPreview.style.display = 'none';
                }
            });
            
            insertUpload.addEventListener('click', function () {
              const file = fileUpload.files[0];
              if (!file) return;

              const formData = new FormData();
              formData.append('image', file);

              fetch('/upload_image', {
                  method: 'POST',
                  body: formData
              })
              .then(res => res.json())
              .then(data => {
                  if (data.success) {
                      imageModal.style.display = 'none';
                      resetImageInputs();
                      showAlert('success', '이미지 업로드가 완료되었습니다.');
                  } else {
                      alert("이미지 업로드에 실패했습니다.");
                  }
              });
          });


            
            // URL 이미지 삽입 (모달 내)
            insertUrl.addEventListener('click', function() {
                const url = imageUrl.value.trim();
                if (url) {
                    insertImageToEditor(url);
                    imageModal.style.display = 'none';
                    resetImageInputs();
                } else {
                    showAlert('error', '이미지 URL을 입력해주세요.');
                }
            });
            
            // 에디터에 이미지 삽입 (이미지 삽입 시 X 버튼이 포함된 형태)
            function insertImageToEditor(src, imageId = null) {
                const wrapper = document.createElement('div');
                wrapper.className = 'image-wrapper';

                const img = document.createElement('img');
                img.src = src;
                if (imageId) {
                    img.setAttribute('data-image-id', imageId);
                }

                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-image-btn';
                removeBtn.innerHTML = '&times;';
                removeBtn.addEventListener('click', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    wrapper.remove();

                    // 이미지 ID로 파일 리스트와 input 제거
                    if (imageId) {
                        const fileListItem = document.querySelector(`#uploaded-files li[data-image-id="${imageId}"]`);
                        const fileInput = document.querySelector(`#image-uploads-container input[data-image-id="${imageId}"]`);
                        if (fileListItem) fileListItem.remove();
                        if (fileInput) fileInput.remove();
                        updateUploadCount();
                        
                        // 이미지 미리보기에 현재 삭제하려는 이미지가 표시되어 있다면 제거
                        const previewImageId = uploadPreview.getAttribute('data-image-id');
                        if (previewImageId === imageId) {
                            uploadPreview.src = '';
                            uploadPreview.style.display = 'none';
                            uploadPreview.removeAttribute('data-image-id');
                            uploadPreview.removeAttribute('data-file');
                            insertUpload.disabled = true;
                        }
                    }
                    
                    resetImageInputs();
                    showAlert('success', '이미지가 삭제되었습니다.');
                });

                wrapper.appendChild(img);
                wrapper.appendChild(removeBtn);

                const selection = window.getSelection();
                if (selection.rangeCount > 0) {
                    const range = selection.getRangeAt(0);
                    range.deleteContents();
                    range.insertNode(wrapper);
                    range.setStartAfter(wrapper);
                    range.setEndAfter(wrapper);
                    selection.removeAllRanges();
                    selection.addRange(range);
                } else {
                    editor.appendChild(wrapper);
                }
                
                editor.focus();
                showAlert('success', '이미지가 삽입되었습니다.');
            }
            
            // 입력 필드 초기화
            function resetImageInputs() {
                fileUpload.value = '';
                imageUrl.value = '';
                uploadPreview.src = '';
                uploadPreview.style.display = 'none';
                uploadPreview.removeAttribute('data-image-id');
                uploadPreview.removeAttribute('data-file');
                uploadPreview.removeAttribute('width');
                uploadPreview.removeAttribute('height');
                urlPreview.src = '';
                urlPreview.style.display = 'none';
                insertUpload.disabled = true;
                document.getElementById('image-alert').style.display = 'none';
            }

        });

        
        
    </script>
</body>
</html>
