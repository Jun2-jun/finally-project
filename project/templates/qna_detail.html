<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }}</title>
    <style>
        body {
            margin: 30px;
            font-family: Arial, sans-serif;
        }

        .post-container {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 5px;
            background-color: #fafafa;
        }

        .post-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .post-meta {
            color: #666;
            margin-bottom: 20px;
        }

        .post-content {
            border-top: 1px solid #ccc;
            padding-top: 20px;
            font-size: 16px;
        }

        .delete-area {
            display: flex;
            justify-content: flex-start;
            margin-top: 15px;
        }

        .delete-button {
            background-color: #e53434;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .delete-button:hover {
            background-color: #c22c2c;
        }

        .back-link {
            margin-top: 20px;
            display: inline-block;
        }
        .button-area {
    display: flex;
    justify-content: flex-end;
    margin-top: 20px;
    gap: 10px;
}

    .back-button {
        background-color: #2cce57;
        color: white;
        padding: 10px 15px;
        border-radius: 5px;
        text-decoration: none;
        font-size: 14px;
        transition: background-color 0.3s;
    }

    .back-button:hover {
        background-color: #0e8d3e;
    }

    </style>
</head>
<body>

    <!-- 게시글 네모 상자 -->
    <div class="post-container">
        <div class="post-title">{{ post.title }}</div>
        <div class="post-meta">
            <p><strong>카테고리:</strong> {{ post.category }}</p>
            <p><strong>작성일:</strong> {{ post.created_at }}</p>
        </div>
        <div class="post-content">
            {{ post.comment | safe }}
        </div>
    </div>

    <div class="button-area">
        <form method="POST" action="{{ url_for('delete_post', post_id=post.id) }}" style="margin-right: 10px;">
            <button type="submit" class="delete-button">삭제</button>
        </form>
        <a href="{{ url_for('qna') }}" class="back-button">목록으로 돌아가기</a>
    </div>

</body>
</html>
