<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>자주 묻는 질문</title>
    <style>
        body {
            margin: 30px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background-color: #f5f5f5;
        }

        .no-posts {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .button-container {
            margin-top: 20px;
            text-align: center;
        }

        .write-button {
            padding: 10px 20px;
            background-color: #2cce57;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none;
        }

        .write-button:hover {
            background-color: #0e8d3e;
        }

        tbody tr:hover {
        background-color: #f0f0f0;
        cursor: pointer;
    }
    </style>
</head>

<body>
    <h2>자주 묻는 질문</h2>
    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>제목</th>
                <th>카테고리</th>
                <th>작성 시간</th>
            </tr>
        </thead>
        <tbody>
            {% if posts %}
            {% for post in posts %}
            <tr onclick="location.href='/qna/post/{{ post.id }}'">
                <td>{{ post.no }}</td>
                <td>
                    <a href="{{ url_for('qna_post_detail', post_id=post.id) }}" style="text-decoration: none; color: inherit;">
                        {{ post.title }}
                    </a>
                </td>
                <td>{{ post.category }}</td>
                <td>{{ post.created_at }}</td>
            </tr>
            {% endfor %}
            
            {% else %}
                <tr>
                    <td colspan="4" class="no-posts">질문이 없습니다.</td>
                </tr>
            {% endif %}
        </tbody>
    </table>

    <div class="button-container">
        <a href="/qna/qnawrite" class="write-button">글쓰기</a>
    </div>
</body>
</html>
